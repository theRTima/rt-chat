services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rtchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/rtchat?sslmode=disable
      DATABASE_POOL_SIZE: "200"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # If still hitting ~1000 connection ceiling with "unexpected EOF":
    # 1. Uncomment network_mode: host below (bypasses docker-proxy)
    # 2. Change DATABASE_URL to localhost instead of db
    # 3. Change frontend's nginx proxy_pass to use host IP instead of backend
    # network_mode: host
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./client
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
