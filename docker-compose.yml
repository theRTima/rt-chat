services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rtchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
    network_mode: host
    environment:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/rtchat?sslmode=disable
      DATABASE_POOL_SIZE: "200"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./client
    ports:
      - "3000:80"
    extra_hosts:
      - "backend:host-gateway"
    depends_on:
      - backend

volumes:
  pgdata:
